name: release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
    

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set Docker image tags
        id: docker_tags
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_without_v=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --no-build --verbosity normal
      - name: Build single file linux-x64
        run: dotnet publish KekUploadServer -c release -r linux-x64 -p:PublishSingleFile=true --self-contained true --verbosity Normal -p:PublishTrimmed=True -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Build single file linux-arm64
        run: dotnet publish KekUploadServer -c release -r linux-arm64 -p:PublishSingleFile=true --self-contained true --verbosity Normal -p:PublishTrimmed=True -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Build single file macos-x64 (Intel)
        run: dotnet publish KekUploadServer -c release -r osx-x64 -p:PublishSingleFile=true --self-contained true --verbosity Normal -p:PublishTrimmed=True -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Build single file macos-arm64 (Apple Silicon)
        run: dotnet publish KekUploadServer -c release -r osx-arm64 -p:PublishSingleFile=true --self-contained true --verbosity Normal -p:PublishTrimmed=True -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Build single file windows-x64
        run: dotnet publish KekUploadServer -c release -r win-x64 -p:PublishSingleFile=true --self-contained true --verbosity Normal -p:PublishTrimmed=True -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Build single file windows-arm64
        run: dotnet publish KekUploadServer -c release -r win-arm64 -p:PublishSingleFile=true --self-contained true --verbosity Normal -p:PublishTrimmed=True -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Move files
        run: |
          mv KekUploadServer/bin/release/net10.0/linux-x64/publish/KekUploadServer KekUploadServer-linux-x64
          mv KekUploadServer/bin/release/net10.0/linux-arm64/publish/KekUploadServer KekUploadServer-linux-arm64
          mv KekUploadServer/bin/release/net10.0/osx-x64/publish/KekUploadServer KekUploadServer-macos-x64
          mv KekUploadServer/bin/release/net10.0/osx-arm64/publish/KekUploadServer KekUploadServer-macos-arm64
          mv KekUploadServer/bin/release/net10.0/win-x64/publish/KekUploadServer.exe KekUploadServer-windows-x64.exe
          mv KekUploadServer/bin/release/net10.0/win-arm64/publish/KekUploadServer.exe KekUploadServer-windows-arm64.exe
          cp KekUploadServer/appsettings.default.json appsettings.default.json
          cp KekUploadServer/Legal.html Legal.html
          cp KekUploadServer/VideoPlayer.html VideoPlayer.html
      - name: Upload single file build linux-x64
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            KekUploadServer-linux-x64
            KekUploadServer-linux-arm64
            KekUploadServer-macos-x64
            KekUploadServer-macos-arm64
            KekUploadServer-windows-x64.exe
            KekUploadServer-windows-arm64.exe
            appsettings.default.json
            Legal.html
            VideoPlayer.html
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./KekUploadServer/Dockerfile
          push: true
          tags: |
            ${{ steps.docker_tags.outputs.image }}:${{ steps.docker_tags.outputs.version }}
            ${{ steps.docker_tags.outputs.image }}:${{ steps.docker_tags.outputs.version_without_v }}
            ${{ steps.docker_tags.outputs.image }}:latest
